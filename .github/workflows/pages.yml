# Pushes the Vite `dist` folder to the `gh-pages` branch. In repo Settings → Pages, set
# "Deploy from a branch" → branch: gh-pages, folder: / (root). That serves the *built*
# app, not the dev index.html on main.
name: Build and deploy to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Build (subpath for project page)
        run: npm run build -- --base=/${{ github.event.repository.name }}/
      - name: Push dist to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
